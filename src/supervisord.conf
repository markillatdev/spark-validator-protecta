[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10

[program:spark-master]
command=/opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
autostart=true
autorestart=true
startretries=3
stdout_logfile=/var/log/supervisor/spark-master.log
stderr_logfile=/var/log/supervisor/spark-master.err

[program:spark-worker-1]
command=/opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark:7077
autostart=true
autorestart=true
startretries=3
stdout_logfile=/var/log/supervisor/spark-worker-1.log
stderr_logfile=/var/log/supervisor/spark-worker-1.err

[program:spark-worker-2]
command=/opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark:7077
autostart=true
autorestart=true
startretries=3
stdout_logfile=/var/log/supervisor/spark-worker-2.log
stderr_logfile=/var/log/supervisor/spark-worker-2.err

[program:uvicorn]
command=uvicorn main:app --host 0.0.0.0 --port 8000 --reload
autostart=true
autorestart=true
startretries=3
stdout_logfile=/var/log/supervisor/uvicorn.log
stderr_logfile=/var/log/supervisor/uvicorn.err
