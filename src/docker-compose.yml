version: '3.8'

networks:
    spark_network:
        driver: bridge
        ipam:
            driver: default
            config:
                - subnet: "172.19.0.0/16"
services:
    spark:
        build: 
            context: .
            dockerfile: Dockerfile
        networks: 
            - spark_network
        environment:
            - SPARK_MODE=master
            - SPARK_RPC_AUTHENTICATION_ENABLED=no
            - SPARK_RPC_ENCRYPTION_ENABLED=no
            - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
            - SPARK_SSL_ENABLED=no
            - SPARK_USER=spark
            - JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
            - PATH=/usr/lib/jvm/java-11-openjdk-amd64/bin:$PATH
            - SPARK_LOCAL_DIRS=/opt/spark/work
            - SPARK_CONF_DIR=/opt/spark/conf
        ports:
            - '8080:8080'
            - '7077:7077'
            - '4040:4040'
        volumes:
            - .:/src
        command: 
            ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]

    spark-worker-1:
        build: 
            context: .
            dockerfile: Dockerfile
        networks: 
            - spark_network
        environment:
            - SPARK_MODE=worker
            - SPARK_MASTER_URL=spark://spark:7077
            - SPARK_WORKER_MEMORY=1G
            - SPARK_WORKER_CORES=1
            - SPARK_RPC_AUTHENTICATION_ENABLED=no
            - SPARK_RPC_ENCRYPTION_ENABLED=no
            - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
            - SPARK_SSL_ENABLED=no
            - SPARK_USER=spark
            - JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
            - PATH=/usr/lib/jvm/java-11-openjdk-amd64/bin:$PATH
            - SPARK_LOCAL_DIRS=/opt/spark/work
            - SPARK_CONF_DIR=/opt/spark/conf
        depends_on:
            - spark
        ports:
            - '8081:8081'
        volumes:
            - .:/src
        command: 
            ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark:7077"]

    spark-worker-2:
        build: 
            context: .
            dockerfile: Dockerfile
        networks: 
            - spark_network
        environment:
            - SPARK_MODE=worker
            - SPARK_MASTER_URL=spark://spark:7077
            - SPARK_WORKER_MEMORY=1G
            - SPARK_WORKER_CORES=1
            - SPARK_RPC_AUTHENTICATION_ENABLED=no
            - SPARK_RPC_ENCRYPTION_ENABLED=no
            - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
            - SPARK_SSL_ENABLED=no
            - SPARK_USER=spark
            - JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
            - PATH=/usr/lib/jvm/java-11-openjdk-amd64/bin:$PATH
            - SPARK_LOCAL_DIRS=/opt/spark/work
            - SPARK_CONF_DIR=/opt/spark/conf
        depends_on:
            - spark
        ports:
            - '8082:8081'
        volumes:
            - .:/src
        command: 
            ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark:7077"]

    spark-worker-3:
        build: 
            context: .
